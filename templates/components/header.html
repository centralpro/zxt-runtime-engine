<header class="site-header">
  <div class="site-header__inner">
    <a class="brand" href="/">
      <img class="brand__icon" src="/favicon/icon.svg?v=2" width="32" height="32" alt="" aria-hidden="true">
      <span class="brand__text">
        <span class="brand__mark">ZXT</span>
        <span class="brand__runtime">/ Runtime</span>
      </span>
    </a>
    <nav class="site-nav" aria-label="主导航">
      {% for item in nav %}
      <a href="{{ item.href }}">{{ item.label }}</a>{% if not loop.last %}<span class="site-nav__sep" aria-hidden="true">/</span>{% endif %}
      {% endfor %}
    </nav>
  </div>
</header>
