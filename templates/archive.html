{% extends "base.html" %}
{% block title %}{{ page_title }} · {{ site.title }}{% endblock %}
{% block content %}
<section class="section">
  <h1>归档</h1>
  {% for year, posts in years.items() %}
  <h2>{{ year }}</h2>
  <div class="post-list">
    {% for post in posts %}
      {% include "components/post-item.html" %}
    {% endfor %}
  </div>
  {% endfor %}
</section>
{% endblock %}
